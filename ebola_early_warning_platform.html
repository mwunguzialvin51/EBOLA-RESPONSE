
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  #app{font-family:'DM Sans',sans-serif;background:#f0f4f8;min-height:600px;color:#1a2332;font-size:15px}
  .nav{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:56px}
  .nav-brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px;color:#0f4c81;cursor:pointer;flex-shrink:0}
  .nav-brand .logo{width:30px;height:30px;background:linear-gradient(135deg,#0f4c81,#0d9488);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
  .nav-links{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
  .nav-links::-webkit-scrollbar{display:none}
  .nav-btn{background:none;border:none;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;white-space:nowrap;transition:all .15s}
  .nav-btn:hover{background:#f1f5f9;color:#0f4c81}
  .nav-btn.active{background:#e0f2fe;color:#0f4c81;font-weight:600}
  .page{padding:16px;max-width:900px;margin:0 auto;animation:fadeIn .25s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .btn-primary{background:#0f4c81;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .btn-primary:hover{background:#0d3f6d;transform:translateY(-1px)}
  .btn-secondary{background:#fff;color:#0f4c81;border:1.5px solid #0f4c81;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
  .btn-secondary:hover{background:#e0f2fe}
  .btn-danger{background:#dc2626;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
  .btn-danger:hover{background:#b91c1c}
  .card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;margin-bottom:14px}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .badge-high{background:#fee2e2;color:#991b1b}
  .badge-medium{background:#fef3c7;color:#92400e}
  .badge-low{background:#d1fae5;color:#065f46}
  .badge-info{background:#dbeafe;color:#1e40af}
  input[type=text],input[type=tel],input[type=password],select,textarea{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;color:#1a2332;background:#fff;outline:none;transition:border .15s}
  input:focus,select:focus,textarea:focus{border-color:#0f4c81}
  label{font-size:13px;font-weight:500;color:#475569;display:block;margin-bottom:5px}
  .form-group{margin-bottom:14px}
  .hero{background:linear-gradient(135deg,#0f4c81 0%,#0d9488 100%);color:#fff;border-radius:16px;padding:32px 24px;margin-bottom:16px;position:relative;overflow:hidden}
  .hero::after{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.07)}
  .hero h1{font-family:'DM Serif Display',serif;font-size:clamp(22px,4vw,32px);line-height:1.2;margin-bottom:10px}
  .hero p{font-size:14px;opacity:.9;line-height:1.6;margin-bottom:20px;max-width:500px}
  .hero-btns{display:flex;gap:10px;flex-wrap:wrap}
  .btn-white{background:#fff;color:#0f4c81;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
  .btn-white:hover{background:#f0f9ff;transform:translateY(-1px)}
  .btn-outline-white{background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.5);padding:9px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
  .btn-outline-white:hover{background:rgba(255,255,255,.25)}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px}
  .stat-card{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:16px;text-align:center}
  .stat-num{font-size:26px;font-weight:700;color:#0f4c81;margin-bottom:2px}
  .stat-lbl{font-size:12px;color:#64748b;font-weight:500}
  .step-q{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;margin-bottom:12px}
  .step-q .q-text{font-size:15px;font-weight:600;color:#1a2332;margin-bottom:14px}
  .yn-btns{display:flex;gap:10px}
  .yn-btn{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid #e2e8f0;background:#fff;color:#475569;transition:all .15s}
  .yn-btn.selected-yes{border-color:#dc2626;background:#fee2e2;color:#991b1b}
  .yn-btn.selected-no{border-color:#0d9488;background:#d1fae5;color:#065f46}
  .yn-btn:hover{border-color:#94a3b8}
  .risk-result{border-radius:14px;padding:24px;text-align:center;margin-bottom:16px}
  .risk-high{background:#fee2e2;border:2px solid #ef4444}
  .risk-medium{background:#fef3c7;border:2px solid #f59e0b}
  .risk-low{background:#d1fae5;border:2px solid #10b981}
  .risk-result h2{font-size:24px;font-weight:700;margin-bottom:6px}
  .risk-result p{font-size:14px;line-height:1.6}
  .edu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:16px}
  .edu-card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:18px}
  .edu-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px}
  .edu-card h3{font-size:15px;font-weight:600;margin-bottom:8px;color:#1a2332}
  .edu-card p{font-size:13px;color:#475569;line-height:1.6}
  .alert-item{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:14px 16px;margin-bottom:10px;border-left:4px solid #94a3b8;display:flex;gap:14px;align-items:flex-start}
  .alert-item.a-HIGH{border-left-color:#ef4444}
  .alert-item.a-MEDIUM{border-left-color:#f59e0b}
  .alert-item.a-INFO{border-left-color:#3b82f6}
  .alert-item.a-LOW{border-left-color:#10b981}
  .alert-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .dot-HIGH{background:#ef4444}
  .dot-MEDIUM{background:#f59e0b}
  .dot-INFO{background:#3b82f6}
  .dot-LOW{background:#10b981}
  .alert-title{font-size:14px;font-weight:600;color:#1a2332;margin-bottom:3px}
  .alert-msg{font-size:13px;color:#475569;line-height:1.5}
  .alert-time{font-size:11px;color:#94a3b8;margin-top:4px}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid #f1f5f9}
  .toggle{position:relative;width:44px;height:24px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;inset:0;background:#cbd5e1;border-radius:20px;cursor:pointer;transition:.2s}
  .toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
  .toggle input:checked+.toggle-slider{background:#0f4c81}
  .toggle input:checked+.toggle-slider:before{transform:translateX(20px)}
  .table-wrap{overflow-x:auto;border-radius:10px;border:1px solid #e2e8f0}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:550px}
  th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0}
  td{padding:10px 14px;border-bottom:1px solid #f1f5f9;color:#374151;vertical-align:top}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#f8fafc}
  .login-wrap{max-width:380px;margin:40px auto}
  .section-title{font-size:18px;font-weight:700;color:#1a2332;margin-bottom:4px}
  .section-sub{font-size:13px;color:#64748b;margin-bottom:16px}
  .myth-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f1f5f9}
  .myth-item:last-child{border-bottom:none}
  .myth-icon{font-size:18px;flex-shrink:0;margin-top:2px}
  .myth-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .myth-text{font-size:13px;color:#475569;line-height:1.5}
  .success-msg{background:#d1fae5;border:1.5px solid #10b981;border-radius:10px;padding:16px;text-align:center;color:#065f46;font-weight:600;font-size:14px;margin-bottom:14px}
  .disclaimer{background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#78350f;margin-top:14px}
  .page-header{margin-bottom:18px}
  .analytics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
  .analytics-bar{height:8px;background:#e2e8f0;border-radius:4px;margin-top:6px;overflow:hidden}
  .analytics-fill{height:100%;border-radius:4px;transition:width .5s ease}
  .nav-mobile-label{display:none}
  @media(max-width:500px){
    .nav-btn{padding:6px 8px;font-size:11px}
    .hero{padding:22px 16px}
    .page{padding:12px}
  }
</style>

<div id="app">
  <nav class="nav">
    <div class="nav-brand" onclick="navigate('home')">
      <div class="logo">E</div>
      <span style="display:none" id="brand-text">ECEWRP</span>
    </div>
    <div class="nav-links" id="nav-links"></div>
  </nav>
  <div id="root"></div>
</div>

<script>
const MOCK_REPORTS=[
  {id:1,name:"Anonymous",phone:"+256 772 XXXXXX",district:"Kampala",symptoms:"Fever, vomiting, fatigue",contact:"Yes – family member",date:"2025-05-20",risk:"High"},
  {id:2,name:"J. Okello",phone:"+256 701 XXXXXX",district:"Gulu",symptoms:"Fever, headache",contact:"No known contact",date:"2025-05-19",risk:"Medium"},
  {id:3,name:"Anonymous",phone:"+256 782 XXXXXX",district:"Mbarara",symptoms:"Mild fever",contact:"No",date:"2025-05-18",risk:"Low"},
  {id:4,name:"M. Nakato",phone:"+256 756 XXXXXX",district:"Jinja",symptoms:"Fever, bleeding gums, vomiting",contact:"Yes – healthcare worker",date:"2025-05-17",risk:"High"},
  {id:5,name:"Anonymous",phone:"+256 714 XXXXXX",district:"Masaka",symptoms:"Fever, body aches",contact:"Possible",date:"2025-05-16",risk:"Medium"},
];
const MOCK_ALERTS=[
  {id:1,type:"HIGH",title:"Suspected Case – Gulu District",message:"A suspected Ebola case has been reported in Gulu. Health workers deployed. Avoid contact with symptomatic individuals.",time:"2 hours ago"},
  {id:2,type:"MEDIUM",title:"Contact Tracing Active – Kampala",message:"Contact tracing underway in Kampala following reported case. Citizens asked to report symptoms immediately.",time:"6 hours ago"},
  {id:3,type:"INFO",title:"Health Team Mobilized – Eastern Region",message:"Uganda NIPH teams mobilised across Eastern Uganda. Screening checkpoints active.",time:"1 day ago"},
  {id:4,type:"INFO",title:"WHO Support Confirmed",message:"WHO has confirmed logistical and diagnostic support to Uganda. Rapid response teams on standby.",time:"2 days ago"},
  {id:5,type:"LOW",title:"Routine Surveillance Update",message:"No new confirmed cases in the past 48 hours. Surveillance continues in border districts.",time:"3 days ago"},
];
const DISTRICTS=["Kampala","Gulu","Mbarara","Jinja","Masaka","Mbale","Lira","Arua","Fort Portal","Soroti","Tororo","Kabale","Entebbe","Mukono","Other"];
const QUESTIONS=[
  {key:"fever",text:"Do you currently have a fever (body temperature above 38°C)?"},
  {key:"vomit",text:"Are you experiencing vomiting or severe nausea?"},
  {key:"bleed",text:"Are you experiencing any unusual bleeding (from gums, nose, skin, or elsewhere)?"},
  {key:"contact",text:"Have you had close contact with a suspected or confirmed Ebola case in the last 21 days?"},
  {key:"travel",text:"Have you recently travelled to an area with an active Ebola outbreak?"},
];

let state={
  page:"home",
  isAdmin:false,
  symptomAnswers:{},
  symptomResult:null,
  reportForm:{name:"",phone:"",district:"",symptoms:"",contact:""},
  reportSubmitted:false,
  reports:[...MOCK_REPORTS],
  loginUser:"",loginPass:"",loginErr:"",
  smsOn:true,emailOn:false,
  alertFilter:"ALL",
};

const navItems=[
  {id:"home",label:"Home"},
  {id:"symptom",label:"Symptom Checker"},
  {id:"report",label:"Report Case"},
  {id:"education",label:"Education"},
  {id:"alerts",label:"Alerts"},
  {id:"admin",label:"Admin"},
];

function navigate(p){
  state.page=p;
  if(p!=='symptom'){state.symptomAnswers={};state.symptomResult=null;}
  if(p!=='report'){state.reportSubmitted=false;}
  render();
}

function render(){
  document.getElementById('nav-links').innerHTML=navItems.map(n=>`<button class="nav-btn${state.page===n.id?' active':''}" onclick="navigate('${n.id}')">${n.label}</button>`).join('');
  const root=document.getElementById('root');
  if(state.page==='home') root.innerHTML=renderHome();
  else if(state.page==='symptom') root.innerHTML=renderSymptom();
  else if(state.page==='report') root.innerHTML=renderReport();
  else if(state.page==='education') root.innerHTML=renderEducation();
  else if(state.page==='alerts') root.innerHTML=renderAlerts();
  else if(state.page==='admin') root.innerHTML=state.isAdmin?renderDashboard():renderLogin();
  bindEvents();
}

function renderHome(){
  return`<div class="page">
  <div class="hero">
    <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:.8;margin-bottom:10px">🇺🇬 Uganda Prototype · Public Health System</div>
    <h1>Ebola Community Early Warning & Response Platform</h1>
    <p>A digital early-warning system empowering communities, health workers, and government institutions to detect, report, and respond to Ebola outbreaks faster — protecting lives across Uganda.</p>
    <div class="hero-btns">
      <button class="btn-white" onclick="navigate('symptom')">🩺 Check Symptoms</button>
      <button class="btn-outline-white" onclick="navigate('admin')">🔐 Admin Dashboard</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num">5</div><div class="stat-lbl">Reports Filed</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#dc2626">2</div><div class="stat-lbl">High-Risk Cases</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#d97706">2</div><div class="stat-lbl">Medium-Risk</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#059669">1</div><div class="stat-lbl">Low-Risk</div></div>
  </div>
  <div class="card">
    <div style="font-size:16px;font-weight:700;color:#1a2332;margin-bottom:4px">What This Platform Does</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:14px">A unified digital tool for outbreak detection and community response</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px">
      ${[["🔍","Symptom Checking","Step-by-step questionnaire to assess Ebola risk levels for individuals in real time."],["📋","Case Reporting","Secure anonymous reporting of suspected cases directly to health authorities."],["📚","Health Education","Evidence-based information on Ebola symptoms, transmission, and prevention."],["🔔","Alert System","Real-time SMS and email alerts for communities in affected districts."],["📊","Admin Dashboard","Centralised data for health officials to monitor, analyse, and coordinate responses."]].map(([icon,title,desc])=>`<div style="padding:14px;background:#f8fafc;border-radius:10px"><div style="font-size:22px;margin-bottom:8px">${icon}</div><div style="font-size:14px;font-weight:600;color:#1a2332;margin-bottom:5px">${title}</div><div style="font-size:12px;color:#64748b;line-height:1.5">${desc}</div></div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div style="font-size:16px;font-weight:700;color:#1a2332;margin-bottom:4px">Why It Matters</div>
    <div style="font-size:13px;color:#475569;line-height:1.7">Uganda has faced multiple Ebola outbreaks — including the 2022 Sudan strain outbreak. Early detection is the single most important factor in preventing mass casualties. This platform reduces reporting delays from <strong>days to minutes</strong>, equipping frontline health workers and community leaders with the tools they need to act fast. Built for low-bandwidth, mobile-first environments across Uganda's 146 districts.</div>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-primary" onclick="navigate('symptom')">Get Started →</button>
      <button class="btn-secondary" onclick="navigate('education')">Learn About Ebola</button>
    </div>
  </div>
</div>`;
}

function renderSymptom(){
  if(state.symptomResult){
    const r=state.symptomResult;
    const cfg={High:{cls:"risk-high",color:"#991b1b",msg:"⚠️ Please seek immediate medical attention. Contact your nearest health facility or call the emergency health line. Do not travel through populated areas.",action:"Report a Case"},Medium:{cls:"risk-medium",color:"#92400e",msg:"⚠ Monitor your symptoms closely. Isolate yourself from others and contact a health worker within 24 hours. Avoid contact with family members.",action:"Report a Case"},Low:{cls:"risk-low",color:"#065f46",msg:"✓ Your risk appears low based on your answers. Continue monitoring for symptoms over the next 21 days. Maintain good hygiene practices.",action:"Learn More"}};
    const c=cfg[r];
    return`<div class="page">
    <div class="page-header"><div class="section-title">Symptom Assessment Result</div></div>
    <div class="risk-result ${c.cls}">
      <div style="font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:${c.color};margin-bottom:6px">Risk Level</div>
      <h2 style="color:${c.color}">${r} Risk</h2>
      <p style="color:${c.color};margin-top:10px;font-size:14px;line-height:1.6">${c.msg}</p>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      <button class="btn-primary" onclick="navigate('report')">📋 ${c.action}</button>
      <button class="btn-secondary" onclick="state.symptomResult=null;state.symptomAnswers={};render()">← Retake Assessment</button>
    </div>
    <div class="disclaimer">⚕️ <strong>Disclaimer:</strong> This is not a medical diagnosis. This tool is for preliminary screening purposes only. Always consult a qualified health professional for medical advice.</div>
    </div>`;
  }
  const answered=Object.keys(state.symptomAnswers).length;
  const progress=Math.round((answered/QUESTIONS.length)*100);
  return`<div class="page">
  <div class="page-header">
    <div class="section-title">Symptom Checker</div>
    <div class="section-sub">Answer all 5 questions honestly. This takes under 2 minutes.</div>
  </div>
  <div style="background:#e2e8f0;border-radius:8px;height:6px;margin-bottom:18px;overflow:hidden">
    <div style="height:100%;background:#0f4c81;border-radius:8px;width:${progress}%;transition:width .3s"></div>
  </div>
  <div style="font-size:12px;color:#64748b;margin-bottom:14px">${answered} of ${QUESTIONS.length} answered</div>
  ${QUESTIONS.map((q,i)=>`<div class="step-q">
    <div style="font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Question ${i+1}</div>
    <div class="q-text">${q.text}</div>
    <div class="yn-btns">
      <button class="yn-btn${state.symptomAnswers[q.key]==='yes'?' selected-yes':''}" onclick="answerQ('${q.key}','yes')">Yes</button>
      <button class="yn-btn${state.symptomAnswers[q.key]==='no'?' selected-no':''}" onclick="answerQ('${q.key}','no')">No</button>
    </div>
  </div>`).join('')}
  <button class="btn-primary" onclick="submitSymptom()" ${answered<QUESTIONS.length?'disabled style="opacity:.5;cursor:not-allowed"':''}>View My Risk Assessment →</button>
  <div class="disclaimer" style="margin-top:12px">⚕️ <strong>Disclaimer:</strong> This is not a medical diagnosis. For informational use only.</div>
  </div>`;
}

function renderReport(){
  if(state.reportSubmitted){
    return`<div class="page"><div class="success-msg">✅ Your report has been submitted successfully. A health officer will follow up shortly. Report ID: #${Date.now().toString().slice(-6)}</div>
    <div style="display:flex;gap:10px"><button class="btn-primary" onclick="navigate('home')">← Back to Home</button><button class="btn-secondary" onclick="state.reportSubmitted=false;render()">Submit Another</button></div></div>`;
  }
  const f=state.reportForm;
  return`<div class="page">
  <div class="page-header"><div class="section-title">Report a Suspected Case</div><div class="section-sub">All reports are treated confidentially. Name is optional.</div></div>
  <div class="card">
    <div class="form-group"><label>Full Name (Optional)</label><input type="text" id="r-name" value="${f.name}" placeholder="Leave blank to remain anonymous" oninput="state.reportForm.name=this.value"></div>
    <div class="form-group"><label>Phone Number</label><input type="tel" id="r-phone" value="${f.phone}" placeholder="+256 7XX XXX XXX" oninput="state.reportForm.phone=this.value"></div>
    <div class="form-group"><label>District / Location *</label><select id="r-dist" onchange="state.reportForm.district=this.value"><option value="">Select a district</option>${DISTRICTS.map(d=>`<option value="${d}"${f.district===d?' selected':''}>${d}</option>`).join('')}</select></div>
    <div class="form-group"><label>Describe Symptoms *</label><textarea id="r-symp" rows="3" placeholder="E.g. High fever for 2 days, vomiting, severe headache..." oninput="state.reportForm.symptoms=this.value">${f.symptoms}</textarea></div>
    <div class="form-group"><label>Possible Contact History</label><textarea id="r-cont" rows="2" placeholder="E.g. Visited family member who was sick, attended a funeral..." oninput="state.reportForm.contact=this.value">${f.contact}</textarea></div>
    <button class="btn-primary" onclick="submitReport()">Submit Report</button>
  </div>
  <div class="disclaimer">🔒 Your information is encrypted and only accessible to authorised Ministry of Health personnel.</div>
  </div>`;
}

function renderEducation(){
  return`<div class="page">
  <div class="page-header"><div class="section-title">Ebola Education Centre</div><div class="section-sub">Trusted, evidence-based information about Ebola Virus Disease</div></div>
  <div class="edu-grid">
    <div class="edu-card"><div class="edu-icon" style="background:#fee2e2">🦠</div><h3>What is Ebola?</h3><p>Ebola Virus Disease (EVD) is a severe and often fatal illness caused by the Ebola virus. It belongs to the Filoviridae family. The disease first appeared in 1976 in Sudan and the DRC. Uganda has experienced multiple outbreaks since 2000.</p></div>
    <div class="edu-card"><div class="edu-icon" style="background:#fef3c7">🤝</div><h3>How It Spreads</h3><p>Ebola spreads through <strong>direct contact</strong> with blood or body fluids of infected people or animals. It is <strong>not airborne</strong>. Common transmission routes include caring for sick patients, handling bodies of deceased patients, and contact with infected wildlife.</p></div>
    <div class="edu-card"><div class="edu-icon" style="background:#d1fae5">🛡️</div><h3>Prevention Methods</h3><p>Wash hands frequently with soap and water. Avoid contact with blood or body fluids of sick individuals. Use PPE when caring for patients. Avoid handling bushmeat. Follow official health authority guidance during outbreaks.</p></div>
    <div class="edu-card"><div class="edu-icon" style="background:#dbeafe">🌡️</div><h3>Symptoms to Watch</h3><p>Symptoms appear 2–21 days after exposure: sudden fever, severe headache, muscle pain, weakness, fatigue, vomiting, diarrhoea, rash, and unexplained bleeding. Seek medical help immediately if you experience these symptoms.</p></div>
  </div>
  <div class="card">
    <div style="font-size:16px;font-weight:700;color:#1a2332;margin-bottom:14px">⚡ Myths vs Facts</div>
    ${[
      ["❌","MYTH","Ebola spreads through the air like the flu","FACT","Ebola does NOT spread through the air. You must have direct contact with the bodily fluids of an infected person."],
      ["❌","MYTH","Ebola is always fatal","FACT","With proper medical care, survival rates can exceed 90%. Early treatment dramatically improves outcomes."],
      ["✅","FACT","You cannot get Ebola from food or water","INFO","Unlike cholera, Ebola is not a waterborne disease. Normal food and water consumption does not pose a risk."],
      ["❌","MYTH","Traditional medicine can cure Ebola","FACT","There is no proven traditional medicine cure. Seek approved medical care. Experimental vaccines (like rVSV-ZEBOV) show strong efficacy."],
      ["✅","FACT","Healthcare workers are at high risk","INFO","Without proper PPE, healthcare workers face elevated risk. Always use full personal protective equipment when treating patients."],
    ].map(([icon,type,title,_,desc])=>`<div class="myth-item"><span class="myth-icon">${icon}</span><div><div class="myth-label" style="color:${type==='MYTH'?'#991b1b':type==='FACT'?'#065f46':'#1e40af'}">${type}</div><div style="font-size:14px;font-weight:600;color:#1a2332;margin-bottom:4px">${title}</div><div class="myth-text">${desc}</div></div></div>`).join('')}
  </div>
  </div>`;
}

function renderAlerts(){
  const types=["ALL","HIGH","MEDIUM","INFO","LOW"];
  const filtered=state.alertFilter==="ALL"?MOCK_ALERTS:MOCK_ALERTS.filter(a=>a.type===state.alertFilter);
  return`<div class="page">
  <div class="page-header"><div class="section-title">Alert Centre</div><div class="section-sub">Real-time notifications from Uganda Ministry of Health</div></div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:14px;font-weight:600;color:#1a2332;margin-bottom:12px">🔔 Notification Preferences</div>
    <div class="toggle-row"><div><div style="font-size:14px;font-weight:500">SMS Alerts</div><div style="font-size:12px;color:#64748b">Receive alerts to your mobile number</div></div><label class="toggle"><input type="checkbox" ${state.smsOn?'checked':''} onchange="state.smsOn=this.checked"><span class="toggle-slider"></span></label></div>
    <div class="toggle-row" style="border-bottom:none"><div><div style="font-size:14px;font-weight:500">Email Alerts</div><div style="font-size:12px;color:#64748b">Receive alerts to your email address</div></div><label class="toggle"><input type="checkbox" ${state.emailOn?'checked':''} onchange="state.emailOn=this.checked"><span class="toggle-slider"></span></label></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    ${types.map(t=>`<button onclick="state.alertFilter='${t}';render()" style="padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid ${state.alertFilter===t?'#0f4c81':'#e2e8f0'};background:${state.alertFilter===t?'#0f4c81':'#fff'};color:${state.alertFilter===t?'#fff':'#475569'};cursor:pointer">${t}</button>`).join('')}
  </div>
  ${filtered.map(a=>`<div class="alert-item a-${a.type}">
    <div class="alert-dot dot-${a.type}"></div>
    <div style="flex:1">
      <div class="alert-title">${a.title}</div>
      <div class="alert-msg">${a.message}</div>
      <div class="alert-time">🕐 ${a.time}</div>
    </div>
    <span class="badge badge-${a.type==='HIGH'?'high':a.type==='MEDIUM'?'medium':a.type==='LOW'?'low':'info'}">${a.type}</span>
  </div>`).join('')}
  </div>`;
}

function renderLogin(){
  return`<div class="page"><div class="login-wrap">
  <div class="card">
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:52px;height:52px;background:linear-gradient(135deg,#0f4c81,#0d9488);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 12px">🔐</div>
      <div style="font-size:18px;font-weight:700;color:#1a2332">Admin Access</div>
      <div style="font-size:13px;color:#64748b;margin-top:4px">Enter any credentials to access the prototype dashboard</div>
    </div>
    ${state.loginErr?`<div style="background:#fee2e2;border:1px solid #ef4444;border-radius:8px;padding:10px;font-size:13px;color:#991b1b;margin-bottom:12px">${state.loginErr}</div>`:''}
    <div class="form-group"><label>Username</label><input type="text" id="l-user" value="${state.loginUser}" placeholder="Enter username" oninput="state.loginUser=this.value"></div>
    <div class="form-group"><label>Password</label><input type="password" id="l-pass" value="${state.loginPass}" placeholder="Enter password" oninput="state.loginPass=this.value" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Login to Dashboard</button>
    <div style="text-align:center;margin-top:12px;font-size:12px;color:#94a3b8">Hint: Any username and password will work for this prototype</div>
  </div>
  </div></div>`;
}

function renderDashboard(){
  const total=state.reports.length;
  const high=state.reports.filter(r=>r.risk==='High').length;
  const med=state.reports.filter(r=>r.risk==='Medium').length;
  const districts=[...new Set(state.reports.map(r=>r.district))];
  return`<div class="page">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div><div class="section-title">Admin Dashboard</div><div class="section-sub">Ebola Case Monitoring — Uganda Ministry of Health</div></div>
    <button class="btn-danger" onclick="state.isAdmin=false;state.loginUser='';state.loginPass='';navigate('home')">Logout</button>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total Reports</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#dc2626">${high}</div><div class="stat-lbl">High Risk</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#d97706">${med}</div><div class="stat-lbl">Medium Risk</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#059669">${total-high-med}</div><div class="stat-lbl">Low Risk</div></div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px">📊 Risk Distribution by District</div>
    ${districts.map(d=>{const count=state.reports.filter(r=>r.district===d).length;const pct=Math.round((count/total)*100);return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="font-weight:500">${d}</span><span style="color:#64748b">${count} case${count!==1?'s':''}</span></div><div class="analytics-bar"><div class="analytics-fill" style="width:${pct}%;background:#0f4c81"></div></div></div>`}).join('')}
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px">📋 All Reported Cases</div>
    <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Name</th><th>District</th><th>Date</th><th>Symptoms</th><th>Risk</th></tr></thead>
      <tbody>
      ${state.reports.map(r=>`<tr>
        <td style="color:#94a3b8;font-size:12px">${r.id}</td>
        <td style="font-weight:500">${r.name}</td>
        <td>${r.district}</td>
        <td style="color:#64748b;white-space:nowrap">${r.date}</td>
        <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.symptoms}</td>
        <td><span class="badge badge-${r.risk==='High'?'high':r.risk==='Medium'?'medium':'low'}">${r.risk}</span></td>
      </tr>`).join('')}
      </tbody>
    </table>
    </div>
  </div>
  <div class="card">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px">⚡ Quick Actions</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn-primary" onclick="navigate('alerts')">📢 View Alerts</button>
      <button class="btn-secondary" onclick="navigate('report')">+ Add Report</button>
    </div>
  </div>
  </div>`;
}

function answerQ(key,val){state.symptomAnswers[key]=val;render();}

function submitSymptom(){
  const a=state.symptomAnswers;
  const yesCount=Object.values(a).filter(v=>v==='yes').length;
  if(a.bleed==='yes'||a.contact==='yes'||yesCount>=3) state.symptomResult='High';
  else if(yesCount>=2) state.symptomResult='Medium';
  else state.symptomResult='Low';
  render();
}

function submitReport(){
  const f=state.reportForm;
  if(!f.district){alert('Please select a district.');return;}
  if(!f.symptoms.trim()){alert('Please describe the symptoms.');return;}
  const yesCount=Object.values(state.symptomAnswers||{}).filter(v=>v==='yes').length;
  const risk=yesCount>=3?'High':yesCount>=2?'Medium':'Low';
  state.reports.unshift({id:state.reports.length+1,name:f.name||'Anonymous',phone:f.phone||'N/A',district:f.district,symptoms:f.symptoms,contact:f.contact||'Not specified',date:new Date().toISOString().split('T')[0],risk});
  state.reportForm={name:'',phone:'',district:'',symptoms:'',contact:''};
  state.reportSubmitted=true;
  render();
}

function doLogin(){
  if(!state.loginUser.trim()||!state.loginPass.trim()){state.loginErr='Please enter both username and password.';render();return;}
  state.isAdmin=true;state.loginErr='';render();
}

function bindEvents(){}

render();
</script>
